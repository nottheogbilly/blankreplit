<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>

  <!-- 🔥 MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    #chat {
      height: calc(100dvh - 70px); /* 🔥 FIXED mobile height */
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
    }

    .msg {
      margin: 6px 0;
      padding: 8px 10px;
      background: #1a1a1a;
      border-radius: 6px;
      word-wrap: break-word;
      font-size: 15px;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #1c1c1c;
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px; /* 🔥 prevents zoom */
      background: #2a2a2a;
      border: none;
      color: white;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 12px;
      font-size: 16px;
      background: #3a3a3a;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:active {
      background: #555;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Type a message...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let lastId = 0;
let seen = new Set();

// 🔥 Add message (NO DUPES EVER)
function addMessage(msg) {
  if (seen.has(msg.id)) return;
  seen.add(msg.id);

  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg";
  div.textContent = `${msg.username}: ${msg.message}`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔥 Fetch messages
async function fetchMessages() {
  try {
    const res = await fetch(`/messages?since=${lastId}`);

    if (res.status === 401) {
      window.location.href = "/";
      return;
    }

    const data = await res.json();
    const messages = data.messages || data;

    messages.forEach(msg => {
      addMessage(msg);
      if (msg.id > lastId) lastId = msg.id;
    });

  } catch (err) {
    console.log("Fetch error:", err);
  }
}

// 🔥 Send message
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if (!text) return;

  await fetch("/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  input.value = "";
}

// 🔥 Enter key
document.getElementById("messageInput")
  .addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
  });

// 🔥 Polling
setInterval(fetchMessages, 1000);

// 🔥 Initial load
fetchMessages();
</script>

</body>
</html>
